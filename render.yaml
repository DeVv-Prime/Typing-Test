services:
  - type: web
    name: typingtest
    runtime: python3
    repo: https://github.com/YOUR_USERNAME/typingtest
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=2 --threads=4 --timeout=120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /data/typingtest.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
